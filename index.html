<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paracetamol — Interactive MD (client-side HFM)</title>
  <!-- onnxruntime-web + 3Dmol from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/3dmol@2.4.0/build/3Dmol-min.js"></script>
  <script>
    // tell ORT where to fetch its wasm binaries
    window.ort.env.wasm.wasmPaths =
      "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/";
  </script>
  <style>
    :root { --bg:#10141c; --panel:#1a2030; --fg:#e6ebf5; --muted:#8b94a8; --accent:#5b9dff; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); height: 100vh; display: flex;
    }
    #viewer { position: relative; flex: 1; min-width: 0; transition: background .4s ease; }
    #panel {
      width: 320px; padding: 20px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 18px;
      background: linear-gradient(180deg, rgba(30,37,56,.82), rgba(20,25,38,.82));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255,255,255,.06);
      box-shadow: inset 1px 0 0 rgba(255,255,255,.04);
    }
    h1 {
      font-size: 17px; margin: 0 0 2px;
      background: linear-gradient(90deg, #8ec5ff, #5b9dff 55%, #c9b3ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .sub { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .control label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .control label b { color: var(--accent); font-variant-numeric: tabular-nums; }
    input[type=range] { width: 100%; accent-color: var(--accent); }
    /* Temperature slider: cool→hot gradient track */
    #temp {
      -webkit-appearance: none; appearance: none;
      height: 8px; border-radius: 999px; outline: none;
      background: linear-gradient(to right, #3b82f6 0%, #8b5cf6 40%, #f59e0b 72%, #ef4444 100%);
    }
    #temp::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
      background: var(--fg); border: 2px solid #061322;
      box-shadow: 0 0 0 1px rgba(0,0,0,.45), 0 0 10px 2px var(--heat, transparent);
      transition: box-shadow .15s ease;
    }
    #temp::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
      background: var(--fg); border: 2px solid #061322;
      box-shadow: 0 0 10px 2px var(--heat, transparent);
    }
    #temp::-moz-range-track {
      height: 8px; border-radius: 999px;
      background: linear-gradient(to right, #3b82f6 0%, #8b5cf6 40%, #f59e0b 72%, #ef4444 100%);
    }
    .buttons { display: flex; gap: 10px; }
    button {
      flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; background: var(--accent); color: #061322;
      transition: transform .12s ease, box-shadow .15s ease, filter .15s ease;
      box-shadow: 0 2px 10px rgba(91,157,255,.25);
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.07); }
    button:active { transform: translateY(0); filter: brightness(.96); }
    button.secondary { background: #2b3349; color: var(--fg); box-shadow: none; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
      border: 1px solid rgba(255,255,255,.06); border-radius: 10px; padding: 10px 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .stat .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .stat .v { font-size: 18px; font-variant-numeric: tabular-nums; }
    #tempSpark { display: block; width: 100%; height: 26px; margin-top: 4px; }
    .pill { font-size: 11px; color: var(--muted); }
    .pill b { color: var(--fg); }
    hr { border: none; border-top: 1px solid #232a3d; margin: 2px 0; }
    .rama-title { font-size: 13px; margin-bottom: 8px; }
    .rama-title .muted { color: var(--muted); font-size: 11px; }
    .rama-canvas { position: relative; width: 260px; height: 260px; margin: 0 auto; }
    .rama-canvas canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <div id="panel">
    <div>
      <h1>Paracetamol — Interactive MD</h1>
      <div class="sub">
        Simulating a trained Hamiltonian Flow Map for Paracetamol. 
        Drag the timestep slider or the thermostat temperature to change the simulation while it is running.
      </div>
    </div>

    <div class="buttons">
      <button id="playBtn">▶ Play</button>
      <button id="resetBtn" class="secondary">↺ Reset</button>
    </div>

    <div class="control">
      <label>Integration timestep <b id="dtVal">5.0 fs</b></label>
      <input type="range" id="dt" min="0.5" max="15" step="0.5" value="5" />
    </div>

    <div class="control">
      <label>Temperature <b id="tempVal">500 K</b></label>
      <input type="range" id="temp" min="0" max="700" step="10" value="500" />
    </div>

    <hr />

    <div class="rama">
      <div class="rama-title">Ramachandran (<i style="font-family:Georgia,'Times New Roman',serif">φ–ψ</i>) <span class="muted">live</span></div>
      <div class="rama-canvas">
        <canvas id="ramaCloud" width="260" height="260"></canvas>
        <canvas id="ramaDot" width="260" height="260"></canvas>
      </div>
    </div>

    <hr />

    <div class="stats">
      <div class="stat"><div class="k">Step</div><div class="v" id="stepCount">0</div></div>
      <div class="stat"><div class="k">Temp (inst.)</div><div class="v" id="curTemp">– K</div><canvas id="tempSpark" width="220" height="52"></canvas></div>
      <div class="stat"><div class="k">Throughput</div><div class="v" id="sps">– steps/s</div></div>
      <div class="stat"><div class="k">Backend</div><div class="v" id="backend">–</div></div>
    </div>

    <div class="pill">Status: <b id="status">Booting…</b></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
